name: Refresh fleet data

# Lunes cada hora 07:00-15:00 UTC = 09:00-17:00 Europe/Madrid (verano CEST).
# Reintenta cada hora: si a las 9 el ETL aun no cargo la semana, fetch.py no
# sobrescribe y el intento de la hora siguiente lo resuelve. Solo hace commit si
# los datos estan listos y han cambiado. En invierno (CET) la franja es 08:00-16:00 local.
# GitHub Actions usa siempre UTC; ajusta las horas aqui si necesitas otra zona.
on:
  schedule:
    - cron: "0 7-15 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh data/*.json
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: python scripts/fetch.py

      - name: Commit si hay cambios
        run: |
          git config user.name  "fleet-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "chore: weekly fleet data refresh"
          git push
