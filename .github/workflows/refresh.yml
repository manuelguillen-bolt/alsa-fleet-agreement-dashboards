name: Refresh fleet data

# Cada dia, cada hora 07:00-15:00 UTC = 09:00-17:00 Europe/Madrid (verano CEST).
# El dashboard solo muestra semanas cerradas, asi que correr a diario no cambia nada
# mientras la semana no cierra; su unico efecto es: cuando cierra una semana (o si el
# ETL carga los datos con retraso), se recogen en <=1 dia en vez de esperar al lunes.
# fetch.py no sobrescribe si la ultima semana aun no tiene datos, y solo commitea si
# hay cambios. En invierno (CET) la franja es 08:00-16:00 local. GitHub usa siempre UTC.
on:
  schedule:
    - cron: "0 7-15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh data/*.json
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: python scripts/fetch.py

      - name: Commit si hay cambios
        run: |
          git config user.name  "fleet-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "chore: fleet data refresh"
          git push
